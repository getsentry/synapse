x-sentry-service-config:
  version: 0.1
  service_name: synapse
  description: Cell routing services (proxy + ingest-router).
  dependencies:
    synapse-proxy:
      description: Synapse proxy
    synapse-ingest-router:
      description: Synapse ingest router
  modes:
    default:
      - synapse-proxy
      - synapse-ingest-router

services:
  synapse-proxy:
    image: us-docker.pkg.dev/sentryio/synapse/image:latest
    command: ["proxy", "--config-file-path", "/app/proxy.yaml"]
    ports:
      - "13000:3000"
      - "13001:3001"
    environment:
      - SYNAPSE_HMAC_SECRET=synapse-dev-secret
    volumes:
      - ./proxy.yaml:/app/proxy.yaml:ro
      - synapse-proxy-cache:/tmp/synapse-cache
    networks:
      - devservices
    healthcheck:
      test: ["CMD", "/app/synapse", "healthcheck", "--config-file-path", "/app/proxy.yaml"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  synapse-ingest-router:
    image: us-docker.pkg.dev/sentryio/synapse/image:latest
    command: ["ingest-router", "--config-file-path", "/app/ingest-router.yaml", "--credentials-path", "/app/relay-credentials.json"]
    ports:
      - "13002:3000"
      - "13003:3001"
    environment:
      - SYNAPSE_HMAC_SECRET=synapse-dev-secret
    volumes:
      - ./ingest-router.yaml:/app/ingest-router.yaml:ro
      - ./devservices-relay-credentials.json:/app/relay-credentials.json:ro
      - synapse-ingest-router-cache:/tmp/synapse-cache
    networks:
      - devservices
    healthcheck:
      test: ["CMD", "/app/synapse", "healthcheck", "--config-file-path", "/app/ingest-router.yaml"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  synapse-proxy-cache:
  synapse-ingest-router-cache:

networks:
  devservices:
    name: devservices
    external: true
