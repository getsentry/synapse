ingest_router:
  listener:
    host: "0.0.0.0"
    port: 3000
  admin_listener:
    host: "0.0.0.0"
    port: 3001

  relay_keys:
    # As defined in https://github.com/getsentry/relay/blob/526f63779017d108dbaef134f65a9205f702d8a4/devservices/config/devservices-credentials.json
    "88888888-4444-4444-8444-cccccccccccc":
      public_key: "SMSesqan65THCV6M4qs4kBzPai60LzuDn-xNsvYpuP8"

  locator:
    type: in_process
    control_plane:
      url: http://host.docker.internal:8000
    backup_route_store:
      type: filesystem
      filename: backup.bin
      compression: zstd1
    localities:
      - "--monolith--"
    locality_to_default_cell:
      "--monolith--": "--monolith--"

  localities:
    "--monolith--":
      - id: "--monolith--"
        sentry_url: http://host.docker.internal:8000
        # Cell's processing relay in sentry's `cell-routing` devservices mode
        # (replaces the default `relay`). Register + projectconfigs route here;
        # envelopes bypass synapse and hit relay-cell directly via the
        # advertised upstream.
        relay_url: http://relay-cell:7900

  routes:
    - match:
        path: /api/0/relays/projectconfigs/
        method: POST
      action:
        handler: relay_project_configs
      locality: "--monolith--"
    - match:
        path: /api/0/relays/live/
        method: GET
      action:
        handler: health
      locality: "--monolith--"
    - match:
        path: /api/0/relays/register/challenge/
        method: POST
      action:
        handler: register_challenge
      locality: "--monolith--"
    - match:
        path: /api/0/relays/register/response/
        method: POST
      action:
        handler: register_response
      locality: "--monolith--"
    - match:
        path: /api/0/relays/publickeys/
        method: POST
      action:
        handler: public_keys
      locality: "--monolith--"

metrics:
  statsd_host: "127.0.0.1"
  statsd_port: 8126
