ingest_router:
  listener:
    host: "0.0.0.0"
    port: 3000
  admin_listener:
    host: "0.0.0.0"
    port: 3001

  locator:
    type: in_process
    control_plane:
      url: http://localhost:8000
    backup_route_store:
      type: filesystem
      base_dir: /tmp/synapse-cache
      filename: backup.bin
      compression: zstd1
    localities:
      - "--monolith--"
    locality_to_default_cell:
      "--monolith--": "--monolith--"

  locales:
    "--monolith--":
      - id: "--monolith--"
        sentry_url: http://localhost:8000
        relay_url: TODO

  routes:
    - match:
        host: localhost
        path: /api/0/relays/projectconfigs/
        method: POST
      action:
        handler: relay_project_configs
      locale: "--monolith--"
    - match:
        host: localhost
        path: /api/0/relays/live/
        method: GET
      action:
        handler: health
      locale: "--monolith--"
    - match:
        host: localhost
        path: /api/0/relays/register/challenge/
        method: POST
      action:
        handler: register_challenge
      locale: "--monolith--"
    - match:
        host: localhost
        path: /api/0/relays/register/response/
        method: POST
      action:
        handler: register_response
      locale: "--monolith--"
    - match:
        host: localhost
        path: /api/0/relays/publickeys/
        method: POST
      action:
        handler: public_keys
      locale: "--monolith--"

metrics:
  statsd_host: "127.0.0.1"
  statsd_port: 8126
