proxy:
  listener:
    host: "0.0.0.0"
    port: 3000
  admin_listener:
    host: "0.0.0.0"
    port: 3001
  locator:
    type: in_process
    control_plane:
      url: http://host.docker.internal:8000
    backup_route_store:
      type: filesystem
      filename: backup.bin
      compression: zstd1
    localities:
      - "--monolith--"
    locality_to_default_cell:
      "--monolith--": "--monolith--"
  upstreams:
    - name: sentry-dev-monolith
      url: http://host.docker.internal:8000
  routes:
    - match:
        path: /organizations/{organization}/*
      action:
        resolver: cell_from_organization
        cell_to_upstream:
          "--monolith--": sentry-dev-monolith
        default: sentry-dev-monolith

metrics:
  statsd_host: "127.0.0.1"
  statsd_port: 8126
