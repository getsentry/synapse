ingest_router:
  listener:
    host: "0.0.0.0"
    port: 3000
  admin_listener:
    host: "0.0.0.0"
    port: 3001
  

  # relay_keys:
    # Verified downstream Relays (POPs) can be configured here, as a map of relay id to relay
    # info.
    # The relay id (the map key) must be a valid UUIDv4 string. This is the same ID that the
    # Relay uses in its `X-Sentry-Relay-Id` header, and is used by Sentry to identify the relay.
    # `public_key` must be the base64url-nopad encoding of the relay's 32 byte ed25519 public
    # key (the `public_key` field of its credentials.json). This is the same value configured
    # for the relay in the upstream's `static_relays`.
    # "00000000-0000-0000-0000-000000000000":
    #   public_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"

  # Locator service configuration for routing public keys to cells
  locator:
    type: in_process
    control_plane:
      url: http://127.0.0.1:8000
    backup_route_store:
      type: filesystem
      base_dir: target/cache
      filename: backup.bin
      compression: zstd1
    localities:
      - us
      - de
    locality_to_default_cell:
      us: us1
      de: de1

  localities:
    us:
      - id: us1
        sentry_url: "http://10.0.0.1:8080"
        relay_url: "http://10.0.0.1:8090"
      - id: us2
        sentry_url: "http://10.0.0.2:8080"
        relay_url: "http://10.0.0.2:8090"
    de:
      - id: de1
        sentry_url: "http://10.0.0.3:8080"
        relay_url: "http://10.0.0.3:8090"

  routes:
    - match:
        host: us.sentry.io
        path: /api/0/relays/projectconfigs/
        method: POST
      action:
        handler: relay_project_configs
      locality: us
    - match:
        host: de.sentry.io
        path: /api/0/relays/projectconfigs/
        method: POST
      action:
        handler: relay_project_configs
      locality: de
    - match:
        host: us.sentry.io
        path: /api/0/relays/live/
        method: GET
      action:
        handler: health
      locality: us
    - match:
        host: de.sentry.io
        path: /api/0/relays/live/
        method: GET
      action:
        handler: health
      locality: de
    - match:
        host: us.sentry.io
        path: /api/0/relays/register/challenge/
        method: POST
      action:
        handler: register_challenge
      locality: us
    - match:
        host: de.sentry.io
        path: /api/0/relays/register/challenge/
        method: POST
      action:
        handler: register_challenge
      locality: de
    - match:
        host: us.sentry.io
        path: /api/0/relays/register/response/
        method: POST
      action:
        handler: register_response
      locality: us
    - match:
        host: de.sentry.io
        path: /api/0/relays/register/response/
        method: POST
      action:
        handler: register_response
      locality: de
    # Public keys endpoint
    - match:
        host: us.sentry.io
        path: /api/0/relays/publickeys/
        method: POST
      action:
        handler: public_keys
      locality: us
    - match:
        host: de.sentry.io
        path: /api/0/relays/publickeys/
        method: POST
      action:
        handler: public_keys
      locality: de


# logging:
#   sentry_dsn: "your_sentry_dsn_here"

metrics:
  statsd_host: "127.0.0.1"
  statsd_port: 8126
